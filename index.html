  <script>
    const works = JSON.parse(document.getElementById('awards-data').textContent);
    const fields = ['title', 'author', 'editor', 'outlet', 'organization', 'submitter', 'category'];
    const controls = {
      search: document.getElementById('search'),
      year: document.getElementById('year'),
      award: document.getElementById('award'),
      category: document.getElementById('category')
    };
    const content = document.getElementById('content');
    const empty = document.getElementById('empty');
    const totalCount = document.getElementById('totalCount');

    function esc(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    }

    function matches(work) {
      const keyword = controls.search.value.trim().toLowerCase();
      if (controls.year.value && work.year !== controls.year.value) return false;
      if (controls.award.value && work.award !== controls.award.value) return false;
      if (controls.category.value && work.category !== controls.category.value) return false;
      if (!keyword) return true;
      return fields.some(field => String(work[field] || '').toLowerCase().includes(keyword));
    }

    function render() {
      const filtered = works.filter(matches);
      totalCount.textContent = filtered.length;
      const grouped = new Map();
      for (const work of filtered) {
        const key = work.category || '未标明项目';
        if (!grouped.has(key)) grouped.set(key, []);
        grouped.get(key).push(work);
      }
      content.innerHTML = Array.from(grouped.entries()).sort((a, b) => a[0].localeCompare(b[0], 'zh-Hans-CN')).map(([category, items]) => `
        <section class="category-block">
          <div class="category-title">
            <h2>${esc(category)}</h2>
            <span class="count">${items.length} 件</span>
          </div>
          <div class="grid">
            ${items.map(work => `
              <article>
                <div class="meta">
                  <span class="tag">${esc(work.year)} ${esc(work.edition)}</span>
                  <span class="tag award">${esc(work.award)}</span>
                  <span class="tag">${esc(work.url_source === '作品网址' ? '直达作品' : work.url_source)}</span>
                </div>
                <a class="title" href="${esc(work.work_url || work.official_url)}" target="_blank" rel="noopener noreferrer">${esc(work.title)}</a>
                <dl>
                  <div class="row"><dt>作者</dt><dd>${esc(work.author || '未列明')}</dd></div>
                  <div class="row"><dt>媒体</dt><dd>${esc(work.outlet || '未列明')}</dd></div>
                  <div class="row"><dt>原创单位</dt><dd>${esc(work.organization || '未列明')}</dd></div>
                </dl>
                <div class="official"><a href="${esc(work.official_url)}" target="_blank" rel="noopener noreferrer">官方推荐表</a></div>
              </article>
            `).join('')}
          </div>
        </section>
      `).join('');
      empty.style.display = filtered.length ? 'none' : 'block';
    }

    Object.values(controls).forEach(control => control.addEventListener('input', render));
    render();
  </script>
